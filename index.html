let index = 0;

for (let y = 25; y > -25; y--) {
    let baris = "";

        let yh = y * 0.1;

        let rumus =
            Math.pow(xh * xh + yh * yh - 1, 3) -

        if (rumus <= 0) {

            index++;
        } else {

    }

    console.log(baris);
}
